services:

  mysql:
    image: mysql:8
    container_name: mysql_container
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: construction_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  ai-service:
    build: ./ai-service
    container_name: ai_forecast_container
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: springboot_container
    ports:
      - "8080:8080"
    environment:
      # Dùng service name "mysql" thay vì localhost khi chạy trong Docker network
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/construction_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      # AI service URL — dùng service name "ai-service" trong Docker network
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: react_container
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
